# Test Fused_CNN_ResNet50_CLIP_ViT_512_Concat on ProGAN with no corruption
# python main.py --config-file "configs/custom/experiment_2.yaml" --eval-only
MODEL:
  TYPE: "MyModel"
  NAME: "Fused_CNN_ResNet50_CLIP_ViT_512_Concat"
  # OUTPUT_DIR: f"output/{_C.MODEL.TYPE}/{_C.MODEL.NAME}" # use value defined in defaults.py
  MODEL_DIR: "/kaggle/input/models/anhphmminh/fused-cnn-resnet50-clip-vit-concat-lf/pytorch/default/1"
  MODEL_NAME: "model.pth.tar-1"

DATASET:
  NAME: "CNNSpotTestSet"
  DATA_DIR: ""
  NUM_CLASSES: 2

DATALOADER:
  BATCH_SIZE: 128

TRANSFORM:
  TRANSFORMS: ["resize", "to_tensor", "normalize"]
  NORMALIZE_BACKBONE: True
  INPUT_SIZE: (224, 224)
  # GAUSSIAN BLUR
  GB_P: 0.5
  GB_K: 21
  GB_SIGMA: (0.1, 3.0)
  # JPEG COMPRESSION
  JPEG_P: 0.5
  JPEG_QUALITY: (30, 99)
  # TEST
  NO_TRANSFORM_TEST: False

TRAINER:
  TYPE: 0
  USE_CUDA: True
  IS_TRAIN: False
  NUM_EPOCHS: 1
  NO_TEST: False # val after epoch and test after train
  TEST_FINAL_MODEL: "best_val"
  OPTIM:
    NAME: "sgd"
    LR: 0.002
    STEPSIZE: [20]

EVALUATOR:
  TYPE: 0
  COMPUTE_CONFUSION_MATRIX: False
