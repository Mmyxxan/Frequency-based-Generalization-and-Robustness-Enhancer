MODEL:
  TYPE: "MyModel"
  NAME: "Fused_CNN_ResNet50_CLIP_ViT_512_Concat"
  # OUTPUT_DIR: f"output/{_C.MODEL.TYPE}/{_C.MODEL.NAME}" # use value defined in defaults.py
  MODEL_DIR: "/kaggle/input/models/anhphmminh/ntire-fused-cnn-resnet50-clip-vit-512-concat/pytorch/default/1"
  MODEL_NAME: "model.pth.tar-2"

DATASET:
  NAME: "NTIRE2026Dataset"
  DATA_DIR: "/kaggle/input/ntire-validation-dataset-update-322026/val_images/val_images"
  NUM_CLASSES: 2

DATALOADER:
  BATCH_SIZE: 128

TRANSFORM:
  TRANSFORMS: ["resize", "to_tensor", "normalize"]
  NORMALIZE_BACKBONE: True
  INTERPOLATION_MODE: "bilinear"
  INPUT_SIZE: (224, 224)
  NO_TRANSFORM_TEST: False

TRAINER:
  TYPE: 0
  USE_CUDA: True
  IS_TRAIN: False
  NO_TEST: False # val after epoch and test after train

EVALUATOR:
  COMPUTE_CONFUSION_MATRIX: False
